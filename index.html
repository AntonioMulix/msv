<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para ti 🎧</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1DB954, #191414);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      max-width: 350px;
    }

    h1 {
      font-weight: 500;
      margin-bottom: 10px;
    }

    p {
      font-weight: 300;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 30px;
      background: #1DB954;
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn:hover {
      background: #17a74a;
      transform: scale(1.05);
    }

    .emoji {
      font-size: 40px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="emoji">🎧</div>
    <h1>Para ti</h1>
    <p>
      Esta playlist me recuerda a ti 💚<br>
      Espero que te guste tanto como a mí
    </p>

    <a class="btn" href="TU_LINK_DE_SPOTIFY_AQUI" target="_blank">
      Escuchar en Spotify
    </a>
  </div>

</body>
</html>
