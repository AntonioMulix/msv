/* Capa oscura encima del fondo */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  z-index: 0;
}

.card {
  position: relative;
  z-index: 1;
  background: rgba(0,0,0,0.65);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  max-width: 350px;
  backdrop-filter: blur(6px);
}

h1 {
  font-weight: 500;
  margin-bottom: 10px;
  color: #fff;
}

p {
  font-weight: 300;
  margin-bottom: 25px;
  color: #eee;
}

.btn {
  display: inline-block;
  padding: 12px 20px;
  border-radius: 30px;
  background: #a855f7; /* morado que combina */
  color: white;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

.btn:hover {
  background: #9333ea;
  transform: scale(1.05);
}

.emoji {
  font-size: 40px;
  margin-bottom: 10px;
}
