<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para ti 🎧</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    /* Fondo animado */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('margaritasLilas.jpeg') no-repeat center center/cover;
      animation: zoomBg 25s ease-in-out infinite alternate;
      z-index: 0;
    }

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 1;
    }

    @keyframes zoomBg {
      from { transform: scale(1); }
      to { transform: scale(1.15); }
    }

    /* Partículas */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 2;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }
      to {
        transform: translateY(-10vh) scale(1);
        opacity: 1;
      }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 3;
      background: rgba(255,255,255,0.08);
      padding: 30px;
      border-radius: 20px;
      max-width: 350px;
      text-align: center;
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
      animation: fadeIn 1.5s ease;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      color: white;
      margin-bottom: 10px;
    }

    #text {
      color: #ddd;
      min-height: 50px;
      margin-bottom: 25px;
    }

    /* Botón glow */
    .btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 30px;
      background: linear-gradient(135deg, #a855f7, #9333ea);
      color: white;
      text-decoration: none;
      font-weight: 500;
      box-shadow: 0 0 20px rgba(168,85,247,0.8);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 15px rgba(168,85,247,0.6); }
      50% { box-shadow: 0 0 30px rgba(168,85,247,1); }
    }

    iframe {
      margin-top: 15px;
      border-radius: 12px;
    }

    .emoji {
      font-size: 42px;
      margin-bottom: 10px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

  </style>

</head>

<body onclick="openSpotify()">

  <!-- partículas -->

  </div>

  <script>
    // TYPEWRITER
    const text = "¿Te ves igual de hermosa todos los días?";
    let i = 0;

    function typeWriter() {
      if (i < text.length) {
        document.getElementById("text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
      }
    }

    typeWriter();

    // PARTÍCULAS
    const container = document.getElementById("particles");

    for (let i = 0; i < 40; i++) {
      const p = document.createElement("div");
      p.classList.add("particle");

      p.style.left = Math.random() * 100 + "vw";
      p.style.animationDuration = (5 + Math.random() * 10) + "s";
      p.style.opacity = Math.random();

      container.appendChild(p);
    }

    // CLICK GLOBAL
    function openSpotify() {
      window.open("https://open.spotify.com/track/3szOJJOPlOVqfKJtqVkoE2", "_blank");
    }
  </script>
